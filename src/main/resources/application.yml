spring:
  application:
    name: uniplan
  # Основной таргет — PostgreSQL (SaaS). Поднять локально: docker compose up -d
  datasource:
    url: jdbc:postgresql://localhost:5432/uniplan
    username: uniplan
    password: uniplan
  jpa:
    hibernate:
      ddl-auto: update          # dev; в проде заменим на Flyway-миграции
    open-in-view: false
    properties:
      hibernate.format_sql: true

---
# Профиль dev: H2 in-memory в режиме PostgreSQL — для запуска/тестов без Postgres.
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: "jdbc:h2:mem:uniplan;MODE=PostgreSQL;DB_CLOSE_DELAY=-1"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
